<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>上传图片</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='bootstrap/css/bootstrap.min.css') }}">
    <script src="{{ url_for('static',filename='bootstrap/js/jquery.js') }}"></script>
</head>
<body>
    <!--以下是导航栏-->
    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container">
            <div class="row">
            <div class="navbar-header">
                <a class="navbar-brand" href="{{ url_for('gallery') }}">我的ai画廊</a>
            </div>

            <div class="col-md-offset-2 collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="{{ url_for('gallery') }}">画廊</a></li>
                    <li class="active"><a href="{{ url_for('upload') }}">上传</a></li>
                    <li><a href="{{ url_for('mange') }}">管理</a></li>
                </ul>
            </div>
            </div>


        </div>
    </nav>

    <div class="container" style="padding-top: 100px;">
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <div class="panel panel-default">
                    <form action="/upload" method="post" enctype="multipart/form-data">

                        <div class="panel-heading">
                            <label for="image_file">上传文件</label>
                        </div>
                        <div class="panel-body">

                        <input type="file" name="image_file">
                        <br>
                        <input type="submit" value="上传">
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
