<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="static/bootstrap/css/bootstrap.min.css">
    <title>登录页面</title>

</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3" style="background-color: #555555; margin-top: 150px; padding: 20px; border-radius: 5px;">

            <h1 style="text-align: center; color: white;">登录界面</h1>

            <form action="{{ url_for('login') }}" method="post">
                <div class="form-group has-error">
                    <label for="username" style="color: white;">用户名</label>
                    <input id="username" name="username" class="form-control" type="text" placeholder="用户名">
                </div>

                <div class="form-group has-error">
                    <label for="password" style="color: white;">密码</label>
                    <input id="password" name="password" class="form-control" type="password" placeholder="密码">
                </div>


                <div class="row">
                    <div class="col-md-6">
                        <input type="submit" class="btn btn-primary btn-block" name="action" value="注册">
                    </div>
                    <div class="col-md-6">
                        <input type="submit" class="btn btn-primary btn-block" name="action" value="登录">
                    </div>
                </div>
            </form>

            {% with messages = get_flashed_messages(with_categories=True) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" style="text-align: center; margin-top: 10px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

        </div>
    </div>
    {% if error %}
        <p style="color: red;">{{error}}</p>
    {% endif %}

{% include 'footer.html' %}

</div>
</body>
</html>
